<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - StudyNotes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: #f3f7ff;
        }
        .admin-wrapper {
            max-width: 1100px;
            margin: 40px auto;
            padding: 24px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .table thead {
            background: #eff6ff;
        }
        .table td, .table th {
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="admin-wrapper">
            <div class="admin-header">
                <div>
                    <h2 class="mb-1">Bảng điều khiển Admin</h2>
                    <p class="text-muted mb-0">Quản lý tài liệu ôn thi và cập nhật trang chính.</p>
                </div>
                <div>
                    <a href="../index.html" class="btn btn-outline-primary me-2">Về trang chủ</a>
                    <button id="logout-btn" class="btn btn-primary">Đăng xuất</button>
                </div>
            </div>

            <form id="doc-form" class="row g-3 mb-4">
                <div class="col-md-4">
                    <input type="text" id="title" class="form-control" placeholder="Tên tài liệu" required>
                </div>
                <div class="col-md-3">
                    <input type="text" id="subject" class="form-control" placeholder="Môn học" required>
                </div>
                <div class="col-md-3">
                    <input type="text" id="fileUrl" class="form-control" placeholder="Đường dẫn file" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Thêm mới</button>
                </div>
            </form>

            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Tài liệu</th>
                        <th>Môn</th>
                        <th>File</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="admin-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'studynotes_docs';
        const AUTH_KEY = 'studynotes_user';

        const user = JSON.parse(localStorage.getItem(AUTH_KEY) || 'null');
        if (!user || user.role !== 'admin') {
            document.body.innerHTML = `
                <div class="container py-5">
                    <div class="alert alert-warning" role="alert">
                        Bạn không có quyền truy cập trang quản trị. Chỉ admin mới được phép quản lý tài liệu.
                    </div>
                    <a href="../index.html" class="btn btn-primary">Quay lại trang chủ</a>
                </div>
            `;
        }

        function loadDocs() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch {
                return [];
            }
        }

        function saveDocs(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function renderAdminList() {
            const docs = loadDocs();
            const list = document.getElementById('admin-list');
            if (!docs.length) {
                list.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Chưa có tài liệu nào</td></tr>';
                return;
            }

            list.innerHTML = docs.map((doc, index) => `
                <tr>
                    <td>${doc.title}</td>
                    <td>${doc.subjectName || doc.subject || 'Khác'}</td>
                    <td><a href="${doc.fileUrl}" target="_blank">${doc.fileUrl}</a></td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteDoc(${index})">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        function deleteDoc(index) {
            const docs = loadDocs();
            docs.splice(index, 1);
            saveDocs(docs);
            renderAdminList();
        }

        document.getElementById('logout-btn').addEventListener('click', function () {
            localStorage.removeItem(AUTH_KEY);
            window.location.href = '../login.html';
        });

        document.getElementById('doc-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const docs = loadDocs();
            const newDoc = {
                id: 'doc-' + Date.now(),
                title: document.getElementById('title').value.trim(),
                description: 'Tài liệu được thêm từ admin.',
                year: new Date().getFullYear().toString(),
                fileUrl: document.getElementById('fileUrl').value.trim(),
                subjectId: document.getElementById('subject').value.trim().toLowerCase(),
                subjectName: document.getElementById('subject').value.trim(),
                thumbnail: '../img/toan.jpg'
            };
            docs.unshift(newDoc);
            saveDocs(docs);
            this.reset();
            renderAdminList();
        });

        renderAdminList();
    </script>
</body>
</html>
