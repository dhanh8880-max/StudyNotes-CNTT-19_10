<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - StudyNotes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eff6ff, #eef2ff);
        }
        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .auth-card {
            width: 100%;
            max-width: 460px;
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
        }
        .auth-card h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .auth-card p {
            color: #6b7280;
            margin-bottom: 22px;
        }
        .auth-error {
            color: #dc2626;
            background: #fee2e2;
            border: 1px solid #fecaca;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <h2>Đăng nhập StudyNotes</h2>
            <p>Chọn vai trò để truy cập phù hợp.</p>
            <div id="auth-error" class="auth-error"></div>
            <form id="login-form">
                <div class="mb-3">
                    <label for="role" class="form-label">Vai trò</label>
                    <select id="role" class="form-select">
                        <option value="customer">Khách hàng</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="username" class="form-label">Tên đăng nhập</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
            </form>
            <div class="mt-3 text-center small text-muted">
                
            </div>
        </div>
    </div>

    <script>
        const AUTH_KEY = 'studynotes_user';
        const demoAccounts = {
            admin: { username: 'admin', password: '123456' },
            customer: { username: 'customer', password: '123456' }
        };

        const currentUser = JSON.parse(localStorage.getItem(AUTH_KEY) || 'null');
        if (currentUser && currentUser.role === 'admin') {
            window.location.href = 'admin/index.html';
        } else if (currentUser && currentUser.role === 'customer') {
            window.location.href = 'index.html';
        }

        document.getElementById('login-form').addEventListener('submit', function (event) {
            event.preventDefault();
            const role = document.getElementById('role').value;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorBox = document.getElementById('auth-error');

            const account = demoAccounts[role];
            const isValid = account && username === account.username && password === account.password;

            if (!isValid) {
                errorBox.textContent = 'Tên đăng nhập hoặc mật khẩu không đúng.';
                errorBox.style.display = 'block';
                return;
            }

            localStorage.setItem(AUTH_KEY, JSON.stringify({ username, role }));
            window.location.href = role === 'admin' ? 'admin/index.html' : 'index.html';
        });
    </script>
</body>
</html>
